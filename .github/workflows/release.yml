name: Release Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build binary
        run: bun run build:binary

      - name: Rename binary with architecture
        run: |
          ARCH=$(uname -m)
          mv bin/macos-mcp bin/macos-mcp-${ARCH}

      - name: Calculate checksum
        id: checksum
        run: |
          SHA256=$(shasum -a 256 bin/macos-mcp-arm64 | awk '{print $1}')
          echo "arm64=$SHA256" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-mcp-${{ runner.arch }}
          path: bin/macos-mcp-*

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/macos-mcp-*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i '' \
            -e "s|version \".*\"|version \"$VERSION\"|" \
            -e "s|sha256 \".*\"|sha256 \"${{ steps.checksum.outputs.arm64 }}\"|g" \
            Formula/macos-ecosystem-mcp.rb

      - name: Commit updated formula
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/macos-ecosystem-mcp.rb
          git diff --cached --quiet || git commit -m "chore: update formula to v${GITHUB_REF#refs/tags/v} [skip ci]"
          git push origin HEAD:main
